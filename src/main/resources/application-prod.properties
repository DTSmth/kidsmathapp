# Production profile — active when SPRING_PROFILES_ACTIVE=prod (set in Cloud Run)

# Cloud SQL via Unix socket (Cloud Run adds the Auth Proxy automatically via --add-cloudsql-instances)
# DB_NAME           = PostgreSQL database name
# CLOUD_SQL_CONNECTION_NAME = PROJECT_ID:REGION:INSTANCE_NAME
spring.datasource.url=jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Quiet down SQL logging in prod
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=update

# Flyway still disabled — relying on Hibernate ddl-auto for now
spring.flyway.enabled=false

# JWT — must be set as a Secret Manager secret in Cloud Run
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# No DevTools in prod
spring.devtools.add-properties=false

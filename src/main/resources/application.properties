spring.application.name=kidsmathapp

# PostgreSQL — values come from env vars; defaults work for local dev with compose.yaml
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${DB_USER:myuser}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway (disabled for local dev)
spring.flyway.enabled=false

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1raWRzLW1hdGgtYXBw}
app.jwt.expiration-ms=86400000

# CORS — override with a comma-separated list via CORS_ALLOWED_ORIGINS env var in prod
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Stripe
stripe.api-key=${STRIPE_API_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price-id=${STRIPE_PRICE_ID:price_placeholder}

# Mail (SendGrid)
spring.mail.host=${SENDGRID_HOST:smtp.sendgrid.net}
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:SG.placeholder}
spring.mail.from=noreply@kidsmathapp.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Internal job secret
internal.job-secret=${INTERNAL_JOB_SECRET:dev-secret}
